name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      # Parity tests skip cleanly when secrets are unavailable (forked PRs):
      # the conftest fixture short-circuits on missing SNOWFLAKE_ACCOUNT.
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
      SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_pk.p8
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: make lint
      - run: make typecheck
      - name: Write Snowflake key file
        run: |
          umask 077
          printf '%s' "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_pk.p8
      - run: make test opts="-n auto"
